name: Build Gemini Desktop (Linux)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Install Frontend Dependencies
      run: npm install

    - name: Calculate Dynamic Version
      id: version
      run: |
        RUN_NUM=${{ github.run_number }}
        
        # Calculate patch, minor, major based on run_number rolling over at 10
        PATCH=$(( RUN_NUM % 10 ))
        MINOR=$(( (RUN_NUM / 10) % 10 ))
        MAJOR=$(( RUN_NUM / 100 ))
        
        VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "Calculated Version: ${VERSION}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        
        # Update tauri.conf.json to match the calculated version
        # Create a temporary file and overwrite to avoid inline replacement issues across platforms
        jq ".version = \"${VERSION}\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.tmp.json
        mv src-tauri/tauri.conf.tmp.json src-tauri/tauri.conf.json
        
        # Also update package.json just in case
        jq ".version = \"${VERSION}\"" package.json > package.tmp.json
        mv package.tmp.json package.json
        
        # And Cargo.toml
        sed -i "s/^version = .*/version = \"${VERSION}\"/" src-tauri/Cargo.toml

    - name: Build Application
      env:
        APPIMAGE_EXTRACT_AND_RUN: 1
        NO_STRIP: true
      run: npm run tauri build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GeminiDesktop-Linux-Bundles
        path: |
          src-tauri/target/release/bundle/deb/*.deb
          src-tauri/target/release/bundle/rpm/*.rpm
          src-tauri/target/release/bundle/appimage/*.AppImage

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Gemini Desktop for Linux ${{ steps.version.outputs.version }}
        generate_release_notes: true
        files: |
          src-tauri/target/release/bundle/deb/*.deb
          src-tauri/target/release/bundle/rpm/*.rpm
          src-tauri/target/release/bundle/appimage/*.AppImage
        body: |
          ### Installation
          
          New release generated from build ${{ github.run_number }}.
          
          **Downloads:**
          - [AppImage](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/gemini-desktop-linux_${{ steps.version.outputs.version }}_amd64.AppImage)
          - [DEB](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/gemini-desktop-linux_${{ steps.version.outputs.version }}_amd64.deb)
          - [RPM](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/gemini-desktop-linux-${{ steps.version.outputs.version }}-1.x86_64.rpm)
